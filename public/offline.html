<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1f3a" />
    <title>Modo offline | Criterio Estrategico</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
        background: #061327;
        color: #ffffff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 0%, rgba(37, 99, 235, 0.38), transparent 38%),
          linear-gradient(145deg, #07111f 0%, #0b1f3a 56%, #061327 100%);
        box-sizing: border-box;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.28);
        padding: 22px;
        line-height: 1.45;
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.12;
      }

      p {
        margin: 0 0 14px;
        color: rgba(255, 255, 255, 0.76);
        font-weight: 700;
      }

      a {
        display: block;
        border-radius: 14px;
        background: linear-gradient(135deg, #facc15, #f97316);
        color: #07111f;
        font-weight: 900;
        padding: 13px 14px;
        text-align: center;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Modo offline activo</h1>
      <p>
        Si ya cargaste la app con internet, vuelve al reporte movil. Sin una
        sesion local previa necesitas iniciar sesion con internet al menos una vez.
      </p>
      <a href="/evaluar-v2">Abrir reporte movil</a>
    </main>
  </body>
</html>
